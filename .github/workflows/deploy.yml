# 松山避難マップを GitHub Pages へ自動デプロイするワークフロー。
# master への push（または手動実行）で、ビルドして dist/ を Pages に公開する。
# 公開操作（Pages 有効化・初回の公開設定）は本人がリポジトリ Settings で行う。
name: Deploy to GitHub Pages

on:
  # master が更新されたら自動デプロイ
  push:
    branches: [master]
  # Actions 画面から手動でも実行できるようにする
  workflow_dispatch:

# Pages へ公開するための最小権限
permissions:
  contents: read
  pages: write
  id-token: write

# 多重実行を防ぐ（新しい push が来たら進行中のデプロイは打ち切る）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 1) ビルドして成果物（dist/）を Pages 用アーティファクトに梱包する
  build:
    runs-on: ubuntu-latest
    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Node セットアップ（npm キャッシュ有効）
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 依存インストール（ロックファイル厳守）
        run: npm ci

      - name: ビルド（build:data + 型チェック + vite build → dist/）
        run: npm run build

      - name: Pages 設定の読み込み
        uses: actions/configure-pages@v5

      - name: dist/ をアーティファクト化
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 2) アーティファクトを GitHub Pages へ公開する
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
